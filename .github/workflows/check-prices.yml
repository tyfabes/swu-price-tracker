name: Check Prices

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger price check
        run: |
          curl -f -X GET "${{ secrets.APP_URL }}/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
